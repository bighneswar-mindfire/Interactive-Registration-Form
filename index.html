<!DOCTYPE html>
<html>

<head>
    <title>
        Interactive Registration Form
    </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div>
        <form onsubmit="event.preventDefault();formSubmit();">

            <label for="name">Full name:</label><label class="validation hide" id="nameValidation">Name is required</label>
            <input type="text" id="name" ><br>
            <br>
            <label for="mail">Email address:</label><label class="validation hide" id="mailValidation">Email is required</label>
            <input type="email" id="mail"><br>
            <br>
            <label for="phone">Phone number:</label><label class="validation hide" id="phoneValidation">Phone no. is required</label>
            <input type="tel" id="phone"><br>
            <br>

            <label for="gender">Gender:</label><label class="validation hide" id="genderValidation">Gender is required</label>

            <input type="radio" id="male" value="Male" name="gender">
            <label for="male">Male</label>

            <input type="radio" id="female" value="Female" name="gender">
            <label for="female">Female</label>

            <input type="radio" id="other" value="Other" name="gender">
            <label for="other">Other</label>
            <br><br>
            <input type="submit" value="Submit">
        </form>
    </div>

    <div>
        <table id="details" border="1">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone no.</th>
                <th>Gender</th>
                <th>Action</th>
            </tr>
        </table>
    </div>
    <script src="script.js"></script>
</body>

</html>
