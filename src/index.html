<!DOCTYPE html>
<html>

<head>
    <title>
        Interactive Registration Form
    </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="grid">
        <div>
            <h2>Registration Form</h2>
            <form onsubmit="event.preventDefault();formSubmit();">

                <label for="name">Full name:</label>
                <input type="text" id="name"><br>
                <label class="validation hide" id="nameValidation">Name is required</label>
                <br><br>
                <label for="mail">Email address:</label>
                <input type="email" id="mail"><br>
                <label class="validation hide" id="mailValidation">Email is required</label>
                <br><br>
                <label for="phone">Phone number:</label>
                <input type="tel" id="phone"><br>
                <label class="validation hide" id="phoneValidation">Phone no. is required</label>
                <br><br>

                <label for="gender">Gender:</label>

                <input type="radio" id="male" value="Male" name="gender">
                <label for="male">Male</label>

                <input type="radio" id="female" value="Female" name="gender">
                <label for="female">Female</label>

                <input type="radio" id="other" value="Other" name="gender">
                <label for="other">Other</label>
                <br>
                <label class="validation hide" id="genderValidation">Gender is required</label>
                <br><br>
                <input type="submit" value="Submit">
            </form>
        </div>

        <div>
            <h2>Registered User Details</h2>
            <table id="details">
                <tr id="table-heading">
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone no.</th>
                    <th>Gender</th>
                    <th>Action</th>
                </tr>
            </table>
        </div>
    </div>
    <script src="../dist/script.js" defer></script>
</body>

</html>
